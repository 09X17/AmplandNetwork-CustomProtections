# Server protection block registry
# Each block supports:
#   material: Minecraft Material (PLAYER_HEAD for heads)
#   custom-model-data: Value for textures using a resource pack (-1 to disable)
#   skull-value: Base64 texture value for custom heads (only if material is PLAYER_HEAD)
#   display-name: Block name using MiniMessage format
#   radius: Protection radius (area = radius * 2 + 1)
#   hide-block: true to hide the block after placement (invisible but still functional)
#   glow-on-view: true for the block to emit particle glow when using /p view
#   enable-merge: true/false if this protection type can be merged with others of the same type
#   max-merge-radius: Maximum radius the merged result can reach (0 = not applicable)

protection-blocks:
  carbon_protector:
    material: "PLAYER_HEAD"
    custom-model-data: -1
