# You can define custom items for each flag state using material, custom model data, or skull value
# Granular flags (5 levels): none, owner, members, admins, everyone
# Boolean flags (enabled/disabled): enabled, disabled
# Set type to "skull" and provide skull-value with base64 textures to use custom heads
# If skull-value is provided (non-empty), skull is used automatically regardless of type
flag-item:
  type: custom-model-data
  material:
    none: PAPER
    owner: PAPER
    members: PAPER
    admins: PAPER
    everyone: PAPER
    disabled: PAPER
    enabled: PAPER

  custom-model-data:
    none: 90003
    owner: 90003
    members: 90003
    admins: 90003
    everyone: 90001
    disabled: 90003
    enabled: 90001

  skull-value:
    none: ""
    owner: ""
    members: ""
    admins: ""
    everyone: ""
    disabled: ""
    enabled: ""

