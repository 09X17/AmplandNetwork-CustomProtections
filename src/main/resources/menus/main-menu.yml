# You can disable decorative borders or customize them with any item (material, custom model data, or skull value)
border:
  enabled: true
  material: BLACK_STAINED_GLASS_PANE
  custom-model-data: -1
  skull-value: ''
  display-name: '<dark_gray> '

separator:
