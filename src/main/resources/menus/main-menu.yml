  material: GRAY_STAINED_GLASS_PANE
  custom-model-data: -1
  skull-value: ''
  display-name: '<dark_gray> '

info-item:
  enabled: true
  slot: 13
  material: PAPER
  custom-model-data: 1059
  skull-value: ''
  display-name: "<#FF7AAD><b>✻ INFORMATION</b></#FF7AAD>"
  lore:
  - ""
  - ' <red>▸</red> <gray>ᴘʀᴏᴛᴇᴄᴛɪᴏɴ ɪᴅ: <aqua>%land%'
  - ' <red>▸</red> <gray>ᴛʏᴘᴇ: <aqua>%type%'
  - ' <red>▸</red> <gray>sɪᴢᴇ: <aqua>%size%'
